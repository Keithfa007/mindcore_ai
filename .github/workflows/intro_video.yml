name: MindCore AI -- Introduction Video (ONE-TIME)

# Manual trigger only -- run once to generate and post the intro video
on:
  workflow_dispatch:
    inputs:
      confirm:
        description: "Type 'yes' to confirm this is a one-time intro video run"
        required: true
        default: "yes"

jobs:
  generate-intro:
    name: Generate + Upload Introduction Video
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-liberation
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install requests openai-whisper

      - name: Generate + upload intro video
        env:
          HEYGEN_API_KEY:       ${{ secrets.HEYGEN_API_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
        run: python video_pipeline/intro_video.py

      - name: Upload intro video artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-intro-video
          path: |
            video_pipeline/output/mindcore_intro.mp4
            video_pipeline/output/intro_upload_result.json
          retention-days: 90

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-intro-debug
          path: video_pipeline/output/
          retention-days: 7

      - name: Summary
        if: always()
        run: |
          echo "## MindCore AI -- Introduction Video" >> $GITHUB_STEP_SUMMARY
          echo "**Avatar:** c25c06ac64c3480bba0f700c1864b7cb" >> $GITHUB_STEP_SUMMARY
          echo "**Format:** 1080x1920 9:16 portrait + Whisper captions" >> $GITHUB_STEP_SUMMARY
          echo "**Platforms:** TikTok + Facebook + Instagram + YouTube" >> $GITHUB_STEP_SUMMARY
          if [ -f "video_pipeline/output/mindcore_intro.mp4" ]; then
            SIZE=$(du -sh video_pipeline/output/mindcore_intro.mp4 | cut -f1)
            echo "**Video:** $SIZE -- download mindcore_intro.mp4 from Artifacts" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "video_pipeline/output/intro_upload_result.json" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Upload Result" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output/intro_upload_result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
