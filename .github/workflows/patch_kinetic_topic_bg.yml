name: Patch Kinetic Topic BG
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run patch
        run: python3 scripts/patch_kinetic_topic_bg.py
      - name: Verify
        run: |
          ! grep -q "BG_VISUAL_CATEGORIES" video_pipeline/kinetic_text_pipeline.py && echo "categories removed OK"
          grep -q "symbolic or metaphorical" video_pipeline/kinetic_text_pipeline.py && echo "topic prompt OK"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add video_pipeline/kinetic_text_pipeline.py
          git commit -m "feat: topic-specific kinetic backgrounds with symbolic imagery"
          git push
