name: MindCore AI Video Pipeline v2

on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note for this run"
        required: false
        default: "manual"

  schedule:
    - cron: "0 9 * * 1"

jobs:
  generate-video:
    name: Generate 4-Scene Cinematic Ad (9:16 TikTok/Facebook)
    runs-on: ubuntu-latest
    timeout-minutes: 90

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install anthropic requests

      - name: Run Video Pipeline v2
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FISH_AUDIO_API_KEY: ${{ secrets.FISH_AUDIO_API_KEY }}
          WAVESPEED_API_KEY: ${{ secrets.WAVESPEED_API_KEY }}
          FISH_VOICE_ID: ${{ secrets.FISH_VOICE_ID }}
        run: |
          echo "Starting MindCore AI Video Pipeline v2"
          echo "Run note: ${{ github.event.inputs.run_note || 'scheduled' }}"
          python video_pipeline/generate_video_v2.py

      # Upload ONLY the final merged video as the primary artifact
      - name: Upload final video
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-ai-ad-v2-run-${{ github.run_number }}
          path: video_pipeline/output/mindcore_ai_ad_v2.mp4
          retention-days: 30

      # On failure, upload everything for debugging
      - name: Upload debug artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-debug-run-${{ github.run_number }}
          path: video_pipeline/output/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## MindCore AI Video Pipeline v2" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Format:** 9:16 vertical -- TikTok + Facebook Reels" >> $GITHUB_STEP_SUMMARY
          if [ -f "video_pipeline/output/script_v2.json" ]; then
            echo "### Generated Script" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output/script_v2.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "video_pipeline/output/mindcore_ai_ad_v2.mp4" ]; then
            SIZE=$(du -sh video_pipeline/output/mindcore_ai_ad_v2.mp4 | cut -f1)
            echo "### Final Video: $SIZE -- download from Artifacts above" >> $GITHUB_STEP_SUMMARY
          else
            echo "### Pipeline did not produce a final video" >> $GITHUB_STEP_SUMMARY
          fi
