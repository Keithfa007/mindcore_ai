name: MindCore AI Video Pipeline v3

on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note for this run"
        required: false
        default: "manual"
      force_mode:
        description: "Force a mode: 'content' or 'ad' (leave blank for automatic)"
        required: false
        default: ""

  schedule:
    # Mon, Wed, Fri at 09:00 UTC
    - cron: "0 9 * * 1,3,5"

jobs:
  generate-video:
    name: Generate Video (9:16 TikTok/Facebook)
    runs-on: ubuntu-latest
    timeout-minutes: 120

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Verify FFmpeg (pre-installed on ubuntu-latest)
        run: ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install anthropic requests

      - name: Show run info
        run: |
          RUN_NUM=${{ github.run_number }}
          MOD=$((RUN_NUM % 10))
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ -n "$FORCE" ]; then
            echo "Mode: FORCED to $FORCE"
          elif [ "$MOD" -eq 0 ]; then
            echo "Mode: AD (run #$RUN_NUM is divisible by 10)"
          else
            echo "Mode: CONTENT (run #$RUN_NUM, next ad at run #$((RUN_NUM + 10 - MOD)))"
          fi

      - name: Run Video Pipeline
        env:
          ANTHROPIC_API_KEY:  ${{ secrets.ANTHROPIC_API_KEY }}
          FISH_AUDIO_API_KEY: ${{ secrets.FISH_AUDIO_API_KEY }}
          WAVESPEED_API_KEY:  ${{ secrets.WAVESPEED_API_KEY }}
          FISH_VOICE_ID:      ${{ secrets.FISH_VOICE_ID }}
          SERP_API_KEY:       ${{ secrets.SERP_API_KEY }}
          GITHUB_RUN_NUMBER:  ${{ github.run_number }}
        run: |
          # Allow force_mode override via env var if provided
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ "$FORCE" = "ad" ]; then
            export GITHUB_RUN_NUMBER=10   # divisible by 10 = ad mode
          elif [ "$FORCE" = "content" ]; then
            export GITHUB_RUN_NUMBER=1    # not divisible by 10 = content mode
          fi
          echo "Starting MindCore AI Video Pipeline"
          python video_pipeline/generate_video_v2.py

      # ── Single artifact bundle with everything you need to post ────────────
      - name: Upload post bundle (video + upload guide + script)
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-post-bundle-run-${{ github.run_number }}
          path: |
            video_pipeline/output/mindcore_ai_ad_v2.mp4
            video_pipeline/output/upload_guide.txt
            video_pipeline/output/script_v2.json
          retention-days: 30

      # ── On failure, upload everything for debugging ────────────────────────
      - name: Upload debug artifacts on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-debug-run-${{ github.run_number }}
          path: video_pipeline/output/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## MindCore AI Video Pipeline v3" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          echo "**Format:** 9:16 vertical -- TikTok + Facebook Reels" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY

          if [ -f "video_pipeline/output/script_v2.json" ]; then
            TYPE=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script_v2.json')); print(d.get('video_type','unknown').upper())" 2>/dev/null || echo "UNKNOWN")
            TOPIC=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script_v2.json')); print(d.get('topic',''))" 2>/dev/null || echo "")
            KW=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script_v2.json')); print(d.get('seo_keyword',''))" 2>/dev/null || echo "")
            echo "**Video type:** $TYPE" >> $GITHUB_STEP_SUMMARY
            echo "**Topic:** $TOPIC" >> $GITHUB_STEP_SUMMARY
            echo "**SEO keyword:** $KW" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Script" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output/script_v2.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "video_pipeline/output/upload_guide.txt" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Upload Guide (TikTok + Facebook)" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output/upload_guide.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi

          if [ -f "video_pipeline/output/mindcore_ai_ad_v2.mp4" ]; then
            SIZE=$(du -sh video_pipeline/output/mindcore_ai_ad_v2.mp4 | cut -f1)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Final Video: $SIZE" >> $GITHUB_STEP_SUMMARY
            echo "Download the **mindcore-post-bundle** from Artifacts above -- contains the MP4, upload guide TXT, and script JSON." >> $GITHUB_STEP_SUMMARY
          else
            echo "### Pipeline did not produce a final video" >> $GITHUB_STEP_SUMMARY
          fi
