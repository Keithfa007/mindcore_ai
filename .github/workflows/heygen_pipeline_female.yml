name: MindCore AI -- Female Video Pipeline

# Female pipeline runs at 13:00 UTC (15:00 Malta summer / 14:00 winter)
# Male pipeline runs at 17:00 UTC -- 4-hour gap between posts on same days
#
# Mon/Wed/Fri 13:00 UTC = Female Avatar
# Tue/Thu    13:00 UTC = Female Cinematic
# Alternate Sundays    = Female Ad (even ISO week) or Content (odd ISO week)
on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note for this run"
        required: false
        default: "manual"
      force_mode:
        description: "Force mode: 'content' or 'ad' (blank = automatic)"
        required: false
        default: ""
      force_format:
        description: "Force format: 'avatar' or 'cinematic' (blank = automatic)"
        required: false
        default: ""

  schedule:
    - cron: "0 13 * * 1,3,5"   # Mon/Wed/Fri -- female avatar
    - cron: "0 13 * * 2,4"     # Tue/Thu     -- female cinematic
    - cron: "0 13 * * 0"       # Sunday      -- alternating ad/content

jobs:
  generate-female-video:
    name: Generate + Upload Female Video (Avatar or Cinematic | 9:16)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-liberation
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install anthropic requests openai-whisper

      - name: Show run info
        run: |
          DAY=$(date +%u)
          WEEK=$(date +%V)
          FORCE="${{ github.event.inputs.force_mode }}"
          FORMAT="${{ github.event.inputs.force_format }}"

          echo "=== MindCore AI Female Pipeline ==="
          if [ -n "$FORCE" ]; then
            echo "Mode: FORCED to $FORCE"
          elif [ "$DAY" = "7" ] && [ $((WEEK % 2)) -eq 0 ]; then
            echo "Mode: AD (even-week Sunday -- week $WEEK)"
          else
            echo "Mode: CONTENT"
          fi

          if [ -n "$FORMAT" ]; then
            echo "Format: FORCED to $FORMAT"
          elif [ "$DAY" = "2" ] || [ "$DAY" = "4" ]; then
            echo "Format: CINEMATIC (Tue/Thu)"
          else
            echo "Format: AVATAR (Mon/Wed/Fri/Sun)"
          fi

          echo "Platforms: TikTok + Facebook + Instagram + YouTube"
          echo "Schedule: 13:00 UTC (4h before male pipeline)"

      - name: Run Female Video Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          HEYGEN_API_KEY:       ${{ secrets.HEYGEN_API_KEY }}
          FISH_AUDIO_API_KEY:   ${{ secrets.FISH_AUDIO_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:         ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
          FORCE_FORMAT:         ${{ github.event.inputs.force_format }}
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          FORMAT="${{ github.event.inputs.force_format }}"
          DAY=$(date +%u)
          WEEK=$(date +%V)

          # --- Mode ---
          if [ "$FORCE" = "ad" ]; then
            export GITHUB_RUN_NUMBER=10
          elif [ "$FORCE" = "content" ]; then
            export GITHUB_RUN_NUMBER=1
          elif [ "$DAY" = "7" ] && [ $((WEEK % 2)) -eq 0 ]; then
            export GITHUB_RUN_NUMBER=10
            echo "Auto-set: AD (even-week Sunday)"
          else
            export GITHUB_RUN_NUMBER=1
          fi

          # --- Format ---
          if [ "$FORMAT" = "cinematic" ]; then
            export FORCE_FORMAT=cinematic
            export GITHUB_RUN_NUMBER=1
          elif [ -z "$FORMAT" ]; then
            if [ "$DAY" = "2" ] || [ "$DAY" = "4" ]; then
              export FORCE_FORMAT=cinematic
              export GITHUB_RUN_NUMBER=1
              echo "Auto-set: FORCE_FORMAT=cinematic (Tue/Thu)"
            fi
          fi

          python video_pipeline/heygen_pipeline_female.py

      - name: Upload post bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-female-video-run-${{ github.run_number }}
          path: |
            video_pipeline/output_female/mindcore_female_video.mp4
            video_pipeline/output_female/upload_guide_female.txt
            video_pipeline/output_female/script_female.json
            video_pipeline/output_female/upload_metadata_female.json
            video_pipeline/output_female/upload_result_female.json
            video_pipeline/output_female/keyword_research.json
          retention-days: 30

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-female-debug-run-${{ github.run_number }}
          path: video_pipeline/output_female/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## MindCore AI Female Video Pipeline v1.0" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }} | **Platforms:** TikTok + Facebook + Instagram + YouTube" >> $GITHUB_STEP_SUMMARY
          echo "**Schedule:** Avatar Mon/Wed/Fri 13:00 UTC | Cinematic Tue/Thu 13:00 UTC" >> $GITHUB_STEP_SUMMARY
          echo "**Voice:** Female Fish Audio | **Subtitles:** Whisper word-by-word captions" >> $GITHUB_STEP_SUMMARY
          if [ -f "video_pipeline/output_female/script_female.json" ]; then
            TOPIC=$(python3 -c "import json; d=json.load(open('video_pipeline/output_female/script_female.json')); print(d.get('topic',''))" 2>/dev/null || echo "")
            KW=$(python3 -c "import json; d=json.load(open('video_pipeline/output_female/script_female.json')); print(d.get('seo_keyword',''))" 2>/dev/null || echo "")
            echo "**Keyword:** $KW" >> $GITHUB_STEP_SUMMARY
            echo "**Topic:** $TOPIC" >> $GITHUB_STEP_SUMMARY
          fi
