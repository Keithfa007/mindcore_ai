name: MindCore AI — Twice-Weekly Blog Automation

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-blog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Switch image gen to fal.ai Flux Pro
        run: |
          python3 << 'PATCH'
          c = open('scripts/blog_automation.py').read()
          c = c.replace(
              'from openai import OpenAI',
              'from scripts.fal_image import generate_fal_image'
          )
          # Replace generate_illustration to use fal.ai Flux Pro
          old = '''def generate_illustration(image_prompt):
    """Generate cinematic-warm image. Tries gpt-image-1 first, falls back to dall-e-2."""
    print("Generating cinematic image...")
    cinematic_prompt = (
        f"{image_prompt}. "
        "Style: cinematic photography, warm golden-hour lighting, "
        "soft focus background with shallow depth of field, "
        "peaceful and hopeful atmosphere, no faces shown — shoot from behind or hands/objects only, "
        "warm amber and soft teal colour grading, photorealistic. "
        "No text, no words, no letters in the image."
    )

    try:
        resp = openai_client.images.generate(
            model="gpt-image-1",
            prompt=cinematic_prompt,
            size="1536x1024",
            quality="high",
            n=1,
        )
        data = resp.data[0]
        if getattr(data, "url", None):
            img = requests.get(data.url, timeout=30).content
        else:
            img = base64.b64decode(data.b64_json)
        print("   Cinematic image generated (gpt-image-1)")
        return img
    except Exception as e1:
        print(f"   gpt-image-1 failed: {e1} — trying dall-e-2...")'''
          new = '''def generate_illustration(image_prompt):
    """Generate cinematic-warm image using fal.ai Flux Pro."""
    print("Generating cinematic image (fal.ai Flux Pro)...")
    cinematic_prompt = (
        f"{image_prompt}. "
        "Style: cinematic photography, warm golden-hour lighting, "
        "soft focus background with shallow depth of field, "
        "peaceful and hopeful atmosphere, no faces shown, "
        "warm amber and soft teal colour grading, photorealistic. "
        "No text, no words, no letters in the image."
    )
    return generate_fal_image(cinematic_prompt, image_size="landscape_4_3", model="pro")'''
          c = c.replace(old, new)
          c = c.replace('openai_client    = OpenAI(api_key=os.environ["OPENAI_API_KEY"])', '# openai_client removed -- using fal.ai')
          open('scripts/blog_automation.py','w').write(c)
          print("Patched: fal.ai Flux Pro for blog images")
          PATCH

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run blog automation pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY:             ${{ secrets.FAL_KEY }}
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
        run: python scripts/blog_automation.py
