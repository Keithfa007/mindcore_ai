name: MindCore AI -- Twice-Weekly Blog Automation

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-blog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: SEO hyphen normalization fix
        run: |
          python3 << 'PATCH'
          c = open('scripts/blog_automation.py').read()
          c = c.replace('kw    = primary_keyword.lower()', 'kw    = primary_keyword.lower().replace("-", " ")')
          c = c.replace('text  = re.sub(r"<[^>]+>", " ", content).lower()', 'text  = re.sub(r"<[^>]+>", " ", content).lower().replace("-", " ")')
          c = c.replace('kw in title.lower(),', 'kw in title.lower().replace("-", " "),')
          c = c.replace('kw in meta.lower(),', 'kw in meta.lower().replace("-", " "),')
          open('scripts/blog_automation.py','w').write(c)
          print("Patched: SEO hyphen normalization")
          PATCH

      - name: Install dependencies
        run: pip install anthropic requests fal-client

      - name: Run blog automation pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY:             ${{ secrets.FAL_KEY }}
          SERP_API_KEY:        ${{ secrets.SERP_API_KEY }}
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          PYTHONPATH:          ${{ github.workspace }}
        run: python scripts/blog_automation.py
