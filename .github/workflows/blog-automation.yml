name: MindCore AI -- Twice-Weekly Blog Automation

on:
  schedule:
    - cron: '0 8 * * 1'
    - cron: '0 8 * * 4'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish-blog:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Switch images to fal.ai Flux Pro
        run: |
          python3 << 'PATCH'
          import re
          c = open('scripts/blog_automation.py').read()
          c = c.replace('from openai import OpenAI', 'from scripts.fal_image import generate_fal_image')
          c = c.replace('openai_client    = OpenAI(api_key=os.environ["OPENAI_API_KEY"])', '# openai_client removed -- using fal.ai')
          new_fn = "def generate_illustration(image_prompt):\n    \"\"\"Generate cinematic-warm image using fal.ai Flux Pro.\"\"\"\n    print(\"Generating cinematic image (fal.ai Flux Pro)...\")\n    cinematic_prompt = (\n        f\"{image_prompt}. \"\n        \"Style: cinematic photography, warm golden-hour lighting, \"\n        \"soft focus background with shallow depth of field, \"\n        \"peaceful and hopeful atmosphere, no faces shown, \"\n        \"warm amber and soft teal colour grading, photorealistic. \"\n        \"No text, no words, no letters in the image.\"\n    )\n    return generate_fal_image(cinematic_prompt, image_size=\"landscape_4_3\", model=\"pro\")"
          c = re.sub(r'def generate_illustration\(image_prompt\):.*?(?=\n\n# -- Step 2)', new_fn + '\n', c, flags=re.DOTALL)
          open('scripts/blog_automation.py','w').write(c)
          print("Patched: fal.ai Flux Pro for blog images")
          PATCH

      - name: Install dependencies
        run: pip install anthropic requests

      - name: Run blog automation pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY:             ${{ secrets.FAL_KEY }}
          SERP_API_KEY:        ${{ secrets.SERP_API_KEY }}
          WP_USERNAME:         ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:     ${{ secrets.WP_APP_PASSWORD }}
          GITHUB_TOKEN:        ${{ secrets.GITHUB_TOKEN }}
          GITHUB_REPOSITORY:   ${{ github.repository }}
          PYTHONPATH:          ${{ github.workspace }}
        run: python scripts/blog_automation.py
