name: MindCore AI -- Video Pipeline

# Schedule: Tue/Wed/Thu 17:00 UTC
# Format: avatar (HeyGen) OR cinematic (Fish Audio TTS + Pexels B-roll)
# Claude decides format per topic automatically
# Ratio: 9 content videos : 1 ad (every 10th run is an ad)
on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note for this run"
        required: false
        default: "manual"
      force_mode:
        description: "Force mode: 'content' or 'ad' (blank = automatic)"
        required: false
        default: ""
      force_format:
        description: "Force format: 'avatar' or 'cinematic' (blank = Claude decides)"
        required: false
        default: ""

  schedule:
    - cron: "0 17 * * 2,3,4"

jobs:
  generate-video:
    name: Generate + Upload Video (Avatar or Cinematic | 9:16)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install anthropic requests

      - name: Show run info
        run: |
          RUN_NUM=${{ github.run_number }}
          MOD=$((RUN_NUM % 10))
          FORCE="${{ github.event.inputs.force_mode }}"
          FORMAT="${{ github.event.inputs.force_format }}"
          if [ -n "$FORCE" ]; then
            echo "Mode: FORCED to $FORCE"
          elif [ "$MOD" -eq 0 ]; then
            echo "Mode: AD (run #$RUN_NUM) -- 1 in 10"
          else
            echo "Mode: CONTENT (run #$RUN_NUM) -- $((10 - MOD)) until next ad"
          fi
          if [ -n "$FORMAT" ]; then
            echo "Format: FORCED to $FORMAT"
          else
            echo "Format: Claude decides (avatar or cinematic)"
          fi
          echo "Platforms: TikTok + Facebook + Instagram + YouTube"
          echo "Schedule: Tue/Wed/Thu 17:00 UTC"

      - name: Run Video Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          HEYGEN_API_KEY:       ${{ secrets.HEYGEN_API_KEY }}
          FISH_AUDIO_API_KEY:   ${{ secrets.FISH_AUDIO_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:         ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
          FORCE_FORMAT:         ${{ github.event.inputs.force_format }}
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ "$FORCE" = "ad" ]; then
            export GITHUB_RUN_NUMBER=10
          elif [ "$FORCE" = "content" ]; then
            export GITHUB_RUN_NUMBER=1
          fi
          python video_pipeline/heygen_pipeline.py

      - name: Upload post bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-video-run-${{ github.run_number }}
          path: |
            video_pipeline/output/mindcore_ai_video.mp4
            video_pipeline/output/upload_guide.txt
            video_pipeline/output/script.json
            video_pipeline/output/upload_metadata.json
            video_pipeline/output/upload_result.json
            video_pipeline/output/keyword_research.json
          retention-days: 30

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-debug-run-${{ github.run_number }}
          path: video_pipeline/output/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## MindCore AI Video Pipeline v5.0" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }} | **Platforms:** TikTok + Facebook + Instagram + YouTube" >> $GITHUB_STEP_SUMMARY
          echo "**Format:** Avatar (HeyGen) or Cinematic (Fish Audio + Pexels) -- Claude decides" >> $GITHUB_STEP_SUMMARY
          echo "**Schedule:** Tue/Wed/Thu 17:00 UTC | 9 content : 1 ad" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "video_pipeline/output/script.json" ]; then
            TYPE=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('video_type','').upper())" 2>/dev/null || echo "")
            FMT=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('render_format','avatar').upper())" 2>/dev/null || echo "AVATAR")
            TOPIC=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('topic',''))" 2>/dev/null || echo "")
            KW=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('seo_keyword',''))" 2>/dev/null || echo "")
            echo "**Type:** $TYPE | **Format:** $FMT | **Keyword:** $KW" >> $GITHUB_STEP_SUMMARY
            echo "**Topic:** $TOPIC" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "video_pipeline/output/upload_result.json" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Upload Result" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output/upload_result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "video_pipeline/output/mindcore_ai_video.mp4" ]; then
            SIZE=$(du -sh video_pipeline/output/mindcore_ai_video.mp4 | cut -f1)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Video: $SIZE" >> $GITHUB_STEP_SUMMARY
          fi
