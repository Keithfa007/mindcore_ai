name: Patch Blog X URL
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run patch
        run: python3 scripts/patch_blog_x_url.py
      - name: Verify
        run: |
          grep -q '"title", x_caption' scripts/blog_automation.py && echo "title fixed"
          ! grep -q 'x_title' scripts/blog_automation.py && echo "x_title removed"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/blog_automation.py
          git commit -m "fix: blog X post now includes article URL in caption"
          git push
