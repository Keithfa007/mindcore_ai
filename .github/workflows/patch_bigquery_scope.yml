name: Patch BigQuery Scope
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run patch
        run: python3 scripts/patch_bigquery_scope.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/bigquery_report.py
          git commit -m "fix: BigQuery scope readonly->full (readonly cannot run query jobs)"
          git push
