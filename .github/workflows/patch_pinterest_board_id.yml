name: Patch -- Pinterest Board ID Fix
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run patch
        run: python scripts/patch_pinterest_board_id.py
      - name: Verify
        run: |
          echo "=== Carousel ==="
          grep -n "pinterest_board_id" scripts/carousel_pipeline.py
          echo "=== Quotes ==="
          grep -n "pinterest_board_id" scripts/quotes_pipeline.py
          echo "=== Blog ==="
          grep -n "pinterest_board_id" scripts/blog_automation.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/carousel_pipeline.py scripts/quotes_pipeline.py scripts/blog_automation.py
          git diff --staged --quiet || git commit -m "fix: Pinterest board_id=1123366769493611180 across all pipelines"
          git push
