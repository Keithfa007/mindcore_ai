name: Patch -- Kinetic Upload Fix
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run patch
        run: python scripts/patch_kinetic_upload.py
      - name: Verify
        run: |
          grep -n "platform.*x" video_pipeline/kinetic_text_pipeline.py
          grep -n "resp.text" video_pipeline/kinetic_text_pipeline.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add video_pipeline/kinetic_text_pipeline.py
          git diff --staged --quiet || git commit -m "fix: kinetic upload twitter→x + error logging"
          git push
