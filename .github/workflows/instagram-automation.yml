name: Instagram Daily Carousel

# PAUSED -- July 2026
# Instagram account was flagged for automation. Manual upload only.
on:
  # schedule:
  #   - cron: "0 6 * * 1"
  #   - cron: "0 6 * * 3"
  #   - cron: "0 6 * * 5"
  #   - cron: "0 9 * * 0"
  workflow_dispatch:

jobs:
  post-to-instagram:
    name: Generate carousel & publish (auto-upload, 4x/week)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic requests Pillow

      - name: Run Instagram automation
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          UPLOADPOST_USER:     ${{ secrets.UPLOADPOST_USER }}
          ENABLE_AUTO_UPLOAD:  "true"
        run: python scripts/instagram_automation.py

      - name: Commit post history & any manual packages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"
          git add scripts/ig_post_history.json manual_upload_packages/
          git diff --staged --quiet || git commit -m "chore: IG carousel run for $(date -u +%Y-%m-%d) [skip ci]"
          git push
        continue-on-error: true
