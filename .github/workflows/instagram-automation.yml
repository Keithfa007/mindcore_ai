name: Instagram Daily Carousel

# TEMPORARILY PAUSED — 14 May 2026
# Reason: Instagram flagged @mind_core_ai for suspected spam activity.
# Upload-Post returned: "Action suspected as spam. Activity is restricted."
# Action needed: complete IG account verification (Settings → Account Status),
# wait 24-48h for restriction to clear, then UN-COMMENT the schedule block
# below and reduce cadence (see Phase 2 plan in chat).
#
# Original schedule (preserved for re-enabling):
#   schedule:
#     - cron: "0 6 * * 1"   # Monday    08:00 Malta
#     - cron: "0 6 * * 2"   # Tuesday   08:00 Malta
#     - cron: "0 6 * * 3"   # Wednesday 08:00 Malta
#     - cron: "0 6 * * 4"   # Thursday  08:00 Malta
#     - cron: "0 6 * * 5"   # Friday    08:00 Malta
#     - cron: "0 9 * * 6"   # Saturday  11:00 Malta
#     - cron: "0 9 * * 0"   # Sunday    11:00 Malta

on:
  # No automated triggers while paused — only manual runs via "Run workflow" button.
  workflow_dispatch:

jobs:
  post-to-instagram:
    name: Generate carousel & publish
    runs-on: ubuntu-latest
    timeout-minutes: 12

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic requests Pillow

      - name: Run Instagram automation
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          UPLOADPOST_USER:     ${{ secrets.UPLOADPOST_USER }}
        run: python scripts/instagram_automation.py

      - name: Commit post history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"
          git add scripts/ig_post_history.json
          git diff --staged --quiet || git commit -m "chore: update IG post history [skip ci]"
          git push
        continue-on-error: true
