name: Instagram Daily Carousel

on:
  # AUTO-UPLOAD RE-ENABLED (18 May 2026) at REDUCED cadence.
  # Context: @mind_core_ai was flagged 14 May for suspected automation and
  # placed in manual-package mode. As of 18 May the IG<->Upload-Post
  # connection has held for 3 consecutive days with no auto-disconnect,
  # so automated posting is restored at a deliberately LOWER 4x/week cadence
  # (Mon/Wed/Fri/Sun) to stay under spam-detection thresholds.
  #
  # RAMP PLAN:
  #   - Weeks 1-2 at 4x/week (current). Watch for ANY auto-disconnect.
  #   - If stable for 2 weeks, may add Tue/Thu back (6x/week).
  #   - Full 7x/week only after a month of clean operation.
  #
  # IF IT GETS FLAGGED AGAIN:
  #   Set ENABLE_AUTO_UPLOAD back to "false" (reverts to manual-package mode,
  #   pipeline keeps generating packages to manual_upload_packages/<date>/).
  schedule:
    - cron: "0 6 * * 1"   # Monday    08:00 Malta
    - cron: "0 6 * * 3"   # Wednesday 08:00 Malta
    - cron: "0 6 * * 5"   # Friday    08:00 Malta
    - cron: "0 9 * * 0"   # Sunday    11:00 Malta
  workflow_dispatch:

jobs:
  post-to-instagram:
    name: Generate carousel & publish (auto-upload, 4x/week)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write   # needed to commit post history back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic requests Pillow

      - name: Run Instagram automation
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          UPLOADPOST_USER:     ${{ secrets.UPLOADPOST_USER }}
          # Auto-upload re-enabled 18 May 2026. Set to "false" to revert to
          # manual-package mode if Instagram flags the account again.
          ENABLE_AUTO_UPLOAD:  "true"
        run: python scripts/instagram_automation.py

      - name: Commit post history & any manual packages
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"
          git add scripts/ig_post_history.json manual_upload_packages/
          git diff --staged --quiet || git commit -m "chore: IG carousel run for $(date -u +%Y-%m-%d) [skip ci]"
          git push
        continue-on-error: true
