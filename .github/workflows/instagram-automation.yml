name: Instagram Daily Carousel

on:
  # MANUAL UPLOAD MODE (v3.0, 14 May 2026):
  # @mind_core_ai is currently flagged by Instagram for suspected automation.
  # The cron is RE-ENABLED on the original schedule, but the script now
  # generates a manual-upload package (saved to manual_upload_packages/<date>/)
  # instead of calling Upload-Post. Keith uploads from his phone for 2 weeks.
  #
  # To restore automated posting after the IG flag clears:
  #   1. Confirm @mind_core_ai is no longer flagged (try one manual reconnect)
  #   2. In the 'env:' section below, set ENABLE_AUTO_UPLOAD to 'true'
  #   3. Recommend ALSO lowering cadence to 3-4 crons/week initially
  schedule:
    - cron: "0 6 * * 1"   # Monday    08:00 Malta
    - cron: "0 6 * * 2"   # Tuesday   08:00 Malta
    - cron: "0 6 * * 3"   # Wednesday 08:00 Malta
    - cron: "0 6 * * 4"   # Thursday  08:00 Malta
    - cron: "0 6 * * 5"   # Friday    08:00 Malta
    - cron: "0 9 * * 6"   # Saturday  11:00 Malta
    - cron: "0 9 * * 0"   # Sunday    11:00 Malta
  workflow_dispatch:

jobs:
  post-to-instagram:
    name: Generate carousel package (manual upload mode)
    runs-on: ubuntu-latest
    timeout-minutes: 12
    permissions:
      contents: write   # needed to commit the package back to the repo

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic requests Pillow

      - name: Run Instagram automation (manual-package mode)
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:      ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          UPLOADPOST_USER:     ${{ secrets.UPLOADPOST_USER }}
          # Set to "true" to restore Upload-Post auto-posting. Default "false" = manual mode.
          ENABLE_AUTO_UPLOAD:  "false"
        run: python scripts/instagram_automation.py

      - name: Commit post history & manual upload package
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"
          git add scripts/ig_post_history.json manual_upload_packages/
          git diff --staged --quiet || git commit -m "chore: IG carousel package for $(date -u +%Y-%m-%d) [skip ci]"
          git push
        continue-on-error: true
