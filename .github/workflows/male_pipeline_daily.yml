name: Male Video Pipeline -- Daily

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  male-daily:
    name: Generate + Schedule Male Cinematic Video
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set alternating post time
        run: |
          DAY=$(date +%j)
          if [ $((DAY % 2)) -eq 1 ]; then
            echo "POST_HOUR_UTC=9" >> $GITHUB_ENV
            echo "Male: MORNING slot (11am Malta)"
          else
            echo "POST_HOUR_UTC=17" >> $GITHUB_ENV
            echo "Male: EVENING slot (7pm Malta)"
          fi
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg fonts-liberation
          pip install anthropic requests openai-whisper
      - name: Run Male Pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:        ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          WAVESPEED_API_KEY:   ${{ secrets.WAVESPEED_API_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          PYTHONPATH:          ${{ github.workspace }}
        run: python video_pipeline/male_pipeline_patch.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: male-daily-run-${{ github.run_number }}
          path: video_pipeline/output/
          retention-days: 14
