name: Patch Blog Pinterest Fix
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run patch
        run: python3 scripts/patch_blog_pinterest.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/blog_automation.py
          git commit -m "Blog automation: add missing UPLOAD_POST variables for Pinterest pin"
          git push
