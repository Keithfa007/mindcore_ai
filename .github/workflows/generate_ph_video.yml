name: Generate Product Hunt Video

on:
  workflow_dispatch:

jobs:
  generate:
    name: Generate PH avatar video (1280x720)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install requests

      - name: Generate video
        env:
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
        run: python video_pipeline/ph_video.py

      - name: Upload video artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-ph-video
          path: video_pipeline/output/ph_video.mp4
          retention-days: 30

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-ph-debug
          path: video_pipeline/output/
          retention-days: 7

      - name: Summary
        if: success()
        run: |
          echo "## \U0001f3a5 Product Hunt Video" >> $GITHUB_STEP_SUMMARY
          echo "Download the MP4 from the **Artifacts** section below." >> $GITHUB_STEP_SUMMARY
          SIZE=$(du -sh video_pipeline/output/ph_video.mp4 | cut -f1)
          echo "File size: $SIZE" >> $GITHUB_STEP_SUMMARY
