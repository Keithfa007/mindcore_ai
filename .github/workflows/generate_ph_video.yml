name: Generate Product Hunt Video

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install deps
        run: pip install requests

      - name: Generate video
        env:
          HEYGEN_API_KEY: ${{ secrets.HEYGEN_API_KEY }}
        run: python video_pipeline/ph_video.py

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-ph-video
          path: video_pipeline/output/ph_video.mp4
          retention-days: 30

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-ph-debug
          path: video_pipeline/output/
          retention-days: 7
