name: Patch Affiliate Fix
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run patch
        run: python3 scripts/patch_affiliate_fix.py
      - name: Verify
        run: |
          grep -q "def pick_angle" scripts/affiliate_carousel_pipeline.py && echo "pick_angle OK"
          ! grep -q "def pick_product" scripts/affiliate_carousel_pipeline.py && echo "pick_product removed OK"
          ! grep -q "price_range" scripts/affiliate_carousel_pipeline.py && echo "price_range removed OK"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/affiliate_carousel_pipeline.py
          git commit -m "fix: complete Online-Therapy conversion for affiliate carousel"
          git push
