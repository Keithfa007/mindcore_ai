name: 📝 Relax Audio Companion Blog

on:
  schedule:
    - cron: '0 12 * * 1'  # Every Monday at 12:00 UTC (3 hours after audio pipeline)
  workflow_dispatch:

jobs:
  generate-companion-blog:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          pip install anthropic openai requests firebase-admin

      - name: Run Companion Blog Pipeline
        env:
          ANTHROPIC_API_KEY:        ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:           ${{ secrets.OPENAI_API_KEY }}
          SERP_API_KEY:             ${{ secrets.SERP_API_KEY }}
          FIREBASE_SERVICE_ACCOUNT: ${{ secrets.FIREBASE_SERVICE_ACCOUNT }}
          WP_USERNAME:              ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:          ${{ secrets.WP_APP_PASSWORD }}
        run: python scripts/relax_audio_blog.py
