name: Patch -- Platform Fix All Pipelines
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run patch
        run: python scripts/patch_platform_fix_all.py
      - name: Verify
        run: |
          echo "=== Kinetic (should NOT have youtube) ==="
          grep "platform" video_pipeline/kinetic_text_pipeline.py | head -5
          echo "=== US Male (should be tiktok+youtube) ==="
          grep "platform" video_pipeline/male_pipeline_patch.py | head -3
          echo "=== US Female (should be tiktok+youtube) ==="
          grep "platform" video_pipeline/female_pipeline.py | head -3
          echo "=== Ebook (should NOT have youtube) ==="
          grep "platform" scripts/ebook_promo_pipeline.py | head -5
          echo "=== Affiliate (should have EU X) ==="
          grep -n "platform.*x\|EU X" scripts/affiliate_carousel_pipeline.py | head -3
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add video_pipeline/kinetic_text_pipeline.py video_pipeline/male_pipeline_patch.py video_pipeline/female_pipeline.py scripts/ebook_promo_pipeline.py scripts/affiliate_carousel_pipeline.py
          git diff --staged --quiet || git commit -m "fix: platform assignments across all pipelines"
          git push
