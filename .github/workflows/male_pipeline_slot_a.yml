name: Male Video Pipeline -- Slot A (11am Malta)

# POST_HOUR_UTC=9 is HARDCODED. Pexels B-roll (v8.0, fal.ai removed).
on:
  workflow_dispatch:
    inputs:
      force_mode:
        description: "'content' or 'ad' (blank = auto)"
        required: false
        default: ""

  schedule:
    - cron: "0 0 * * 6,0"  # Sat/Sun 00:00 UTC = 2am Malta

jobs:
  male-slot-a:
    name: Male Video Slot A -- posts 11am Malta
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg fonts-liberation
          pip install anthropic requests openai-whisper
      - name: Run Slot A
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FISH_AUDIO_API_KEY:  ${{ secrets.FISH_AUDIO_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:        ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          PYTHONPATH:          ${{ github.workspace }}
          POST_HOUR_UTC:       "9"
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          [ "$FORCE" = "ad" ]      && export GITHUB_RUN_NUMBER=10
          [ "$FORCE" = "content" ] && export GITHUB_RUN_NUMBER=1
          python video_pipeline/male_pipeline_patch.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: male-slot-a-run-${{ github.run_number }}
          path: |
            video_pipeline/output/mindcore_ai_video.mp4
            video_pipeline/output/upload_guide.txt
            video_pipeline/output/script.json
            video_pipeline/output/upload_result.json
          retention-days: 30
      - name: Debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: male-slot-a-debug-${{ github.run_number }}
          path: video_pipeline/output/
          retention-days: 7
