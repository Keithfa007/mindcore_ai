name: US TikTok -- Ebook Promo (Tue/Thu)

on:
  schedule:
    - cron: "0 8 * * 2,4"  # Tue/Thu -- same days as EU
  workflow_dispatch:

jobs:
  us-ebook-promo:
    name: US Ebook Promo -- 3pm EDT
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure for US market
        run: |
          sed -i 's/UPLOAD_POST_USER    = "MindCoreAI"/UPLOAD_POST_USER    = "MindCoreAI_US"/' scripts/ebook_promo_pipeline.py
          sed -i 's/TK_HASHTAGS = .*/TK_HASHTAGS = "#mindcoreai #mentalhealth #mentalhealthmatters #mentalhealthtiktok #therapytok #recovery #addiction #sobriety #sobertok #ebook #selfhelp #healing #fyp #mentalhealthusa"/' scripts/ebook_promo_pipeline.py
          sed -i 's/FB_HASHTAGS = .*/FB_HASHTAGS = "#mentalhealth #mentalhealthmatters #recovery #addiction #healing #selfhelp #mindcoreai #mentalhealthusa"/' scripts/ebook_promo_pipeline.py
          sed -i 's/scheduled_date = get_scheduled_time(6)/scheduled_date = get_scheduled_time(19)/' scripts/ebook_promo_pipeline.py
          echo "US config: MindCoreAI_US | POST 19:00 UTC (3pm EDT) | US hashtags"

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install anthropic requests

      - name: Run ebook promo pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
        run: python scripts/ebook_promo_pipeline.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: us-ebook-run-${{ github.run_number }}
          path: scripts/ebook_output/
          retention-days: 14
