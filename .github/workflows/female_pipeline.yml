name: Female Video Pipeline

# SCHEDULE v2 -- overnight generation + Upload-Post scheduled posting
# Pipeline generates at 00:00 UTC = 2am Malta
# Upload-Post fires at exactly 17:00 UTC = 19:00 Malta (7pm)
# v5.0: Pexels B-roll restored -- fal.ai removed
on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note"
        required: false
        default: "manual"
      force_mode:
        description: "'content' or 'ad' (blank = auto)"
        required: false
        default: ""

  schedule:
    - cron: "0 0 * * *"  # 00:00 UTC = 2am Malta

jobs:
  generate-female-video:
    name: Generate + Schedule Female Cinematic Video (Pexels)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg fonts-liberation
      - name: Install Python dependencies
        run: pip install anthropic requests openai-whisper
      - name: Show run info
        run: |
          echo "Pipeline: Female Cinematic v5.0 (Pexels)"
          echo "Generate: 00:00 UTC = 2am Malta"
          echo "Post: 17:00 UTC = 7pm Malta (Upload-Post scheduled_date)"
      - name: Run Female Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          FISH_AUDIO_API_KEY:   ${{ secrets.FISH_AUDIO_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:         ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
          PYTHONPATH:           ${{ github.workspace }}
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          [ "$FORCE" = "ad" ]      && export GITHUB_RUN_NUMBER=10
          [ "$FORCE" = "content" ] && export GITHUB_RUN_NUMBER=1
          python video_pipeline/female_pipeline.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-female-run-${{ github.run_number }}
          path: |
            video_pipeline/output_female/mindcore_female_video.mp4
            video_pipeline/output_female/upload_guide_female.txt
            video_pipeline/output_female/script_female.json
            video_pipeline/output_female/upload_result_female.json
          retention-days: 30
      - name: Debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-female-debug-${{ github.run_number }}
          path: video_pipeline/output_female/
          retention-days: 7
