name: Female Video Pipeline -- Daily

# Runs daily, alternates morning/evening with male pipeline
# Odd days: Female EVENING (7pm Malta) / Male MORNING (11am Malta)
# Even days: Female MORNING (11am Malta) / Male EVENING (7pm Malta)

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:

jobs:
  female-daily:
    name: Generate + Schedule Female Cinematic Video
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Set alternating post time
        run: |
          DAY=$(date +%j)
          if [ $((DAY % 2)) -eq 1 ]; then
            echo "POST_HOUR_UTC=17" >> $GITHUB_ENV
            echo "Female: EVENING slot (7pm Malta)"
          else
            echo "POST_HOUR_UTC=9" >> $GITHUB_ENV
            echo "Female: MORNING slot (11am Malta)"
          fi
      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg fonts-liberation
      - name: Install Python dependencies
        run: pip install anthropic requests openai-whisper
      - name: Run Female Pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:        ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          PYTHONPATH:          ${{ github.workspace }}
        run: python video_pipeline/female_pipeline.py
      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: female-daily-run-${{ github.run_number }}
          path: video_pipeline/output_female/
          retention-days: 14
