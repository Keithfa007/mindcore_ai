name: Female Video Pipeline

# Day-optimised schedule (Malta = UTC+2 summer):
#   Mon-Fri: 07:00 UTC = 09:00 Malta  (Tue/Thu 9AM peak)
#   Sat-Sun: 05:00 UTC = 07:00 Malta  (Sat/Sun 7AM peak)
# GitHub Actions cron days: 0=Sun 1=Mon 2=Tue 3=Wed 4=Thu 5=Fri 6=Sat
on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note for this run"
        required: false
        default: "manual"
      force_mode:
        description: "Force mode: 'content' or 'ad' (blank = automatic)"
        required: false
        default: ""

  schedule:
    - cron: "0 7 * * 1-5"  # Mon-Fri 07:00 UTC (09:00 Malta)
    - cron: "0 5 * * 6,0"  # Sat + Sun 05:00 UTC (07:00 Malta)

jobs:
  generate-female-video:
    name: Generate + Upload Female Cinematic Video (9:16)
    runs-on: ubuntu-latest
    timeout-minutes: 45

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-liberation
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install anthropic requests openai-whisper

      - name: Show run info
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ "$FORCE" = "ad" ]; then
            echo "Mode: FORCED AD"
          elif [ "$FORCE" = "content" ]; then
            echo "Mode: FORCED CONTENT"
          else
            echo "Mode: AUTO (ad every 10th run)"
          fi
          echo "Schedule: Mon-Fri 09:00 Malta | Sat-Sun 07:00 Malta"
          echo "Pipeline: female_pipeline.py | CTA: SEEN / HEALING / TIRED / SAME"

      - name: Run Female Cinematic Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          FISH_AUDIO_API_KEY:   ${{ secrets.FISH_AUDIO_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:         ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ "$FORCE" = "ad" ]; then
            export GITHUB_RUN_NUMBER=10
          elif [ "$FORCE" = "content" ]; then
            export GITHUB_RUN_NUMBER=1
          fi
          python video_pipeline/female_pipeline.py

      - name: Upload post bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-female-run-${{ github.run_number }}
          path: |
            video_pipeline/output_female/mindcore_female_video.mp4
            video_pipeline/output_female/upload_guide_female.txt
            video_pipeline/output_female/script_female.json
            video_pipeline/output_female/upload_metadata_female.json
            video_pipeline/output_female/upload_result_female.json
            video_pipeline/output_female/keyword_research.json
          retention-days: 30

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-female-debug-${{ github.run_number }}
          path: video_pipeline/output_female/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## Female Video Pipeline v2.5" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }} | **Script:** female_pipeline.py | **Platforms:** TikTok + Facebook + Instagram + YouTube" >> $GITHUB_STEP_SUMMARY
          if [ -f "video_pipeline/output_female/script_female.json" ]; then
            TOPIC=$(python3 -c "import json; d=json.load(open('video_pipeline/output_female/script_female.json')); print(d.get('topic',''))" 2>/dev/null || echo "")
            KW=$(python3 -c "import json; d=json.load(open('video_pipeline/output_female/script_female.json')); print(d.get('seo_keyword',''))" 2>/dev/null || echo "")
            HOOK=$(python3 -c "import json; d=json.load(open('video_pipeline/output_female/script_female.json')); print(d.get('hook_formula',''))" 2>/dev/null || echo "")
            echo "**Keyword:** $KW | **Hook:** $HOOK" >> $GITHUB_STEP_SUMMARY
            echo "**Topic:** $TOPIC" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "video_pipeline/output_female/upload_result_female.json" ]; then
            echo "### Upload Result" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output_female/upload_result_female.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
