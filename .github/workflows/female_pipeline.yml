name: Female Video Pipeline
on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note"
        required: false
        default: "manual"
      force_mode:
        description: "'content' or 'ad' (blank = auto)"
        required: false
        default: ""
  schedule:
    - cron: "0 0 * * *"
jobs:
  generate-female-video:
    name: Generate + Schedule Female Cinematic Video
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg fonts-liberation
      - name: Install Python dependencies
        run: pip install anthropic requests openai-whisper
      - name: Run Female Pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:        ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          PYTHONPATH:          ${{ github.workspace }}
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          [ "$FORCE" = "ad" ]      && export GITHUB_RUN_NUMBER=10
          [ "$FORCE" = "content" ] && export GITHUB_RUN_NUMBER=1
          python video_pipeline/female_pipeline.py
      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-female-run-${{ github.run_number }}
          path: video_pipeline/output_female/
          retention-days: 30
      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-female-debug-${{ github.run_number }}
          path: video_pipeline/output_female/
          retention-days: 7
