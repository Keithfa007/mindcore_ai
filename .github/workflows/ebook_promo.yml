name: Ebook Promo Pipeline

# 4x per week: Monday, Wednesday, Friday, Sunday at 08:00 UTC (10:00 Malta)
# Each run picks a random promo angle from 8 options -- different script every time
on:
  schedule:
    - cron: '0 8 * * 0,1,3,5'    # Sun, Mon, Wed, Fri 08:00 UTC
  workflow_dispatch:               # Manual trigger

jobs:
  ebook-promo:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install anthropic requests

      - name: Run ebook promo pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          FISH_AUDIO_API_KEY:  ${{ secrets.FISH_AUDIO_API_KEY }}
        run: python scripts/ebook_promo_pipeline.py
