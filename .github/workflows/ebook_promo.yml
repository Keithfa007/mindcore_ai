name: Ebook Promo Pipeline

# Tuesday + Thursday at 08:00 UTC, scheduled to post at 15:00 UTC (17:00 Malta)
on:
  schedule:
    - cron: '0 8 * * 2,4'
  workflow_dispatch:

jobs:
  ebook-promo:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg
          pip install anthropic requests

      - name: Run ebook promo pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          POST_HOUR_UTC:       "15"
        run: python scripts/ebook_promo_pipeline.py
