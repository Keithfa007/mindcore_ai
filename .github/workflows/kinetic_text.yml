name: Kinetic Text Pipeline (Prototype)

on:
  workflow_dispatch:

jobs:
  kinetic:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends ffmpeg fonts-liberation
          pip install anthropic requests openai-whisper Pillow

      - name: Run kinetic text pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          ELEVENLABS_API_KEY:  ${{ secrets.ELEVENLABS_API_KEY }}
          FAL_KEY:             ${{ secrets.FAL_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          POST_HOUR_UTC:       "15"
          # UPLOAD_POST_API_KEY intentionally omitted — review mode only
        run: python video_pipeline/kinetic_text_pipeline.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: kinetic-run-${{ github.run_number }}
          path: video_pipeline/output_kinetic/
          retention-days: 14
