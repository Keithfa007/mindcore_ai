name: Male Video Pipeline

# SCHEDULE v2 -- overnight generation + Upload-Post scheduled posting
# Both slots generate at ~2am Malta. Upload-Post fires at exact target times.
# Slot A: cron 00:00 UTC = 2am Malta -> posts at 09:00 UTC = 11am Malta
# Slot B: cron 01:00 UTC = 3am Malta -> posts at 13:00 UTC = 3pm Malta
# schedule_utils.py auto-detects slot from current UTC hour
# Full fal.ai video (~$1.25/video, 4 videos/weekend)
on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note for this run"
        required: false
        default: "manual"
      force_mode:
        description: "Force mode: 'content' or 'ad' (blank = automatic)"
        required: false
        default: ""

  schedule:
    - cron: "0 0 * * 6,0"  # Sat/Sun 00:00 UTC = 2am Malta -> Slot A -> posts 11am Malta
    - cron: "0 1 * * 6,0"  # Sat/Sun 01:00 UTC = 3am Malta -> Slot B -> posts 3pm Malta

jobs:
  generate-male-video:
    name: Generate + Schedule Male Cinematic Video (9:16)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg + fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg fonts-liberation
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install anthropic requests openai-whisper fal-client

      - name: Show run info
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ "$FORCE" = "ad" ]; then
            echo "Mode: FORCED AD"
          elif [ "$FORCE" = "content" ]; then
            echo "Mode: FORCED CONTENT"
          else
            echo "Mode: AUTO (ad every 10th run)"
          fi
          echo "Slot A (00:00 UTC): generates 2am Malta -> posts 11am Malta"
          echo "Slot B (01:00 UTC): generates 3am Malta -> posts 3pm Malta"
          echo "Video: Full fal.ai (5 clips x Wan 2.5 ~$1.25/video)"

      - name: Run Male Cinematic Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          FISH_AUDIO_API_KEY:   ${{ secrets.FISH_AUDIO_API_KEY }}
          PEXELS_API_KEY:       ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:         ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          FAL_KEY:              ${{ secrets.FAL_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
          PYTHONPATH:           ${{ github.workspace }}
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ "$FORCE" = "ad" ]; then
            export GITHUB_RUN_NUMBER=10
          elif [ "$FORCE" = "content" ]; then
            export GITHUB_RUN_NUMBER=1
          fi
          python video_pipeline/male_pipeline.py

      - name: Upload post bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-male-run-${{ github.run_number }}
          path: |
            video_pipeline/output/mindcore_ai_video.mp4
            video_pipeline/output/upload_guide.txt
            video_pipeline/output/script.json
            video_pipeline/output/upload_metadata.json
            video_pipeline/output/upload_result.json
            video_pipeline/output/keyword_research.json
          retention-days: 30

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-male-debug-${{ github.run_number }}
          path: video_pipeline/output/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## Male Video Pipeline v7.9" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }} | Slot A->11am or Slot B->3pm Malta (scheduled)" >> $GITHUB_STEP_SUMMARY
          if [ -f "video_pipeline/output/script.json" ]; then
            TOPIC=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('topic',''))" 2>/dev/null || echo "")
            KW=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('seo_keyword',''))" 2>/dev/null || echo "")
            HOOK=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('hook_formula',''))" 2>/dev/null || echo "")
            echo "**Keyword:** $KW | **Hook:** $HOOK" >> $GITHUB_STEP_SUMMARY
            echo "**Topic:** $TOPIC" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "video_pipeline/output/upload_result.json" ]; then
            echo "### Upload Result" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output/upload_result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
