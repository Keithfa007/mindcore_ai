name: Patch -- Pinterest Board ID Fix (All Pipelines)
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run patch
        run: python scripts/patch_carousel_pinterest_fix.py
      - name: Verify
        run: |
          echo "=== Carousel ==="
          grep -n "pinterest_board" scripts/carousel_pipeline.py || echo "NOT FOUND"
          echo "=== Quotes ==="
          grep -n "pinterest_board" scripts/quotes_pipeline.py || echo "NOT FOUND"
          echo "=== Blog ==="
          grep -n "pinterest_board" scripts/blog_automation.py || echo "NOT FOUND"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/carousel_pipeline.py scripts/quotes_pipeline.py scripts/blog_automation.py
          git diff --staged --quiet || git commit -m "fix: add Pinterest board ID (mental-health) to all pipelines"
          git push
