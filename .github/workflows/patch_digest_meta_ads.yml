name: Patch Digest Meta Ads
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run patch
        run: python3 scripts/patch_digest_meta_ads.py
      - name: Verify
        run: |
          grep -q "v3.5" scripts/telegram_digest.py && echo "Version OK"
          grep -q "get_meta_ads_stats" scripts/telegram_digest.py && echo "Function OK"
          grep -q "META_ACCESS_TOKEN" scripts/telegram_digest.py && echo "Env var OK"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/telegram_digest.py
          git commit -m "Telegram digest v3.5: add Meta Ads campaign report"
          git push
