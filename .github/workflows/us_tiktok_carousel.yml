name: US TikTok -- Carousel (Daily)

on:
  schedule:
    - cron: "0 2 * * *"
  workflow_dispatch:

jobs:
  us-carousel:
    name: US Carousel -- 12pm EDT
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Configure for US market + fal.ai
        run: |
          cp video_pipeline/heygen_config_us.json video_pipeline/heygen_config.json
          sed -i 's/HASHTAGS=.*/HASHTAGS="#mindcoreai #mentalhealth #mentalhealthmatters #mentalhealthtiktok #therapytok #anxietyrelief #mentalhealthawareness #healing #selfcare #fyp #foryoupage #mentalhealthusa"/' scripts/carousel_pipeline.py
          sed -i 's/POST_HOUR_UTC=11/POST_HOUR_UTC=16/' scripts/carousel_pipeline.py

          python3 << 'PATCH'
          c = open('scripts/carousel_pipeline.py').read()
          c = c.replace(
              'from openai import OpenAI',
              'from scripts.fal_image import generate_fal_image'
          )
          old_fn = '''def generate_slide_image(oc,sk,topic,gender):
    pools=IMAGE_POOLS_MALE if gender=="male" else IMAGE_POOLS_FEMALE
    ps=len(pools[sk]); sn=int(sk.split("_")[1]); base_idx=(GITHUB_RUN_NUMBER+sn-1)%ps
    for attempt in range(3):
        idx=(base_idx+attempt)%ps
        prompt=pools[sk][idx]
        if sk=="slide_1" and topic: prompt=f"{prompt} Emotional theme: {topic}."
        print(f"  [gpt-image-1 LOW] {sk} generating... (pool idx {idx}/{ps-1}, attempt {attempt+1}/3)")
        try:
            r=oc.images.generate(model="gpt-image-1",prompt=prompt,size="1024x1536",quality="low",n=1)
            d=r.data[0]; ib=requests.get(d.url,timeout=60).content if getattr(d,"url",None) else base64.b64decode(d.b64_json)
            print(f"  [gpt-image-1 LOW] {sk} ready ({len(ib)//1024:.0f} KB)"); return ib
        except Exception as e:
            if "moderation" in str(e).lower() or "safety" in str(e).lower():
                print(f"  [gpt-image-1] {sk} BLOCKED by moderation (attempt {attempt+1}/3), trying next prompt...")
                continue
            raise
    raise RuntimeError(f"All 3 image prompts for {sk} were blocked by moderation")'''
          new_fn = '''def generate_slide_image(oc,sk,topic,gender):
    pools=IMAGE_POOLS_MALE if gender=="male" else IMAGE_POOLS_FEMALE
    ps=len(pools[sk]); sn=int(sk.split("_")[1]); base_idx=(GITHUB_RUN_NUMBER+sn-1)%ps
    for attempt in range(3):
        idx=(base_idx+attempt)%ps
        prompt=pools[sk][idx]
        if sk=="slide_1" and topic: prompt=f"{prompt} Emotional theme: {topic}."
        print(f"  [fal.ai Flux] {sk} generating... (pool idx {idx}/{ps-1}, attempt {attempt+1}/3)")
        try:
            ib=generate_fal_image(prompt)
            print(f"  [fal.ai Flux] {sk} ready ({len(ib)//1024:.0f} KB)"); return ib
        except Exception as e:
            if "safety" in str(e).lower() or "moderation" in str(e).lower():
                print(f"  [fal.ai] {sk} BLOCKED (attempt {attempt+1}/3), trying next prompt...")
                continue
            raise
    raise RuntimeError(f"All 3 image prompts for {sk} were blocked")'''
          c = c.replace(old_fn, new_fn)
          c = c.replace('oc=OpenAI(api_key=OPENAI_API_KEY)', 'oc=None  # fal.ai replaces OpenAI')
          open('scripts/carousel_pipeline.py','w').write(c)
          print("Patched: fal.ai + US config")
          PATCH

          echo "US config: MindCoreAI_US | POST 16:00 UTC (12pm EDT) | US hashtags | fal.ai Flux"

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-liberation

      - name: Install Python dependencies
        run: pip install anthropic requests Pillow

      - name: Run Carousel Pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_API_KEY:         ${{ secrets.FAL_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          PYTHONPATH:          ${{ github.workspace }}
        run: python scripts/carousel_pipeline.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: us-carousel-run-${{ github.run_number }}
          path: scripts/carousel_output/
          retention-days: 14
