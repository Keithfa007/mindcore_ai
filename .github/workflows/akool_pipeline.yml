name: MindCore AI -- Akool Cinematic Pipeline

# Cinematic 9:16 video pipeline using Akool Image-to-Video (Seedance 1.5 Pro)
# Schedule: Mon/Wed/Fri 09:00 UTC -- same as HeyGen pipeline
# Ratio: 9 content videos : 1 ad (every 10th run is an ad)
on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note for this run"
        required: false
        default: "manual"
      force_mode:
        description: "Force mode: 'content' or 'ad' (blank = automatic)"
        required: false
        default: ""

  schedule:
    - cron: "0 9 * * 1,3,5"

jobs:
  generate-cinematic-video:
    name: Generate Cinematic Video (Akool | 9:16 | Seedance)
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install FFmpeg
        run: |
          sudo apt-get install -y --no-install-recommends ffmpeg
          ffmpeg -version | head -1

      - name: Install Python dependencies
        run: pip install anthropic requests

      - name: Show run info
        run: |
          RUN_NUM=${{ github.run_number }}
          MOD=$((RUN_NUM % 10))
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ -n "$FORCE" ]; then
            echo "Mode: FORCED to $FORCE"
          elif [ "$MOD" -eq 0 ]; then
            echo "Mode: AD (run #$RUN_NUM) -- 1 in 10"
          else
            echo "Mode: CONTENT (run #$RUN_NUM) -- $((10 - MOD)) until next ad"
          fi
          echo "Model: Seedance 1.5 Pro via Akool I2V API"
          echo "Format: 9:16 1080p cinematic | 6 scenes x 5s"

      - name: Run Akool Cinematic Pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          AKOOL_API_KEY:     ${{ secrets.AKOOL_API_KEY }}
          SERP_API_KEY:      ${{ secrets.SERP_API_KEY }}
          GITHUB_RUN_NUMBER: ${{ github.run_number }}
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          if [ "$FORCE" = "ad" ]; then
            export GITHUB_RUN_NUMBER=10
          elif [ "$FORCE" = "content" ]; then
            export GITHUB_RUN_NUMBER=1
          fi
          python video_pipeline/akool_pipeline.py

      - name: Upload post bundle
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: mindcore-akool-run-${{ github.run_number }}
          path: |
            video_pipeline/output/mindcore_ai_video.mp4
            video_pipeline/output/upload_guide.txt
            video_pipeline/output/script.json
            video_pipeline/output/scene_prompts.json
          retention-days: 30

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: mindcore-akool-debug-${{ github.run_number }}
          path: video_pipeline/output/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## MindCore AI -- Akool Cinematic Pipeline" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }} | **Model:** Seedance 1.5 Pro" >> $GITHUB_STEP_SUMMARY
          echo "**Format:** 9:16 1080p cinematic -- TikTok + Facebook Reels" >> $GITHUB_STEP_SUMMARY
          echo "**Schedule:** Mon/Wed/Fri 09:00 UTC | 9 content : 1 ad" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ -f "video_pipeline/output/script.json" ]; then
            TYPE=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('video_type','').upper())" 2>/dev/null || echo "")
            TOPIC=$(python3 -c "import json; d=json.load(open('video_pipeline/output/script.json')); print(d.get('topic',''))" 2>/dev/null || echo "")
            echo "**Type:** $TYPE" >> $GITHUB_STEP_SUMMARY
            echo "**Topic:** $TOPIC" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output/script.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "video_pipeline/output/upload_guide.txt" ]; then
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Upload Guide" >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
            cat video_pipeline/output/upload_guide.txt >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "video_pipeline/output/mindcore_ai_video.mp4" ]; then
            SIZE=$(du -sh video_pipeline/output/mindcore_ai_video.mp4 | cut -f1)
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "### Video ready: $SIZE -- download from Artifacts above" >> $GITHUB_STEP_SUMMARY
          fi
