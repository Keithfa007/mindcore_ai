name: Daily Quote -- X (Twitter)

# Generates 2 quotes at 00:30 UTC, scheduled to post at 08:00 and 20:00 Malta
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  x-quotes:
    name: Generate 2 X quotes (morning + evening)
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fonts + dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-liberation
          pip install anthropic requests Pillow

      - name: Morning quote (08:00 Malta / 06:00 UTC)
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          POST_HOUR_UTC:       "6"
          PYTHONPATH:          ${{ github.workspace }}
        run: python scripts/quotes_pipeline.py

      - name: Evening quote (20:00 Malta / 18:00 UTC)
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:   "${{ github.run_number }}1"
          POST_HOUR_UTC:       "18"
          PYTHONPATH:          ${{ github.workspace }}
        run: python scripts/quotes_pipeline.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: x-quotes-run-${{ github.run_number }}
          path: scripts/quotes_output/
          retention-days: 14
