name: Daily Quote -- X (Twitter)

# Two posts per day to X: morning (08:00 Malta) and evening (20:00 Malta)
on:
  schedule:
    - cron: "30 0 * * *"   # Morning run → posts at 06:00 UTC (08:00 Malta)
    - cron: "0 16 * * *"   # Evening run → posts at 18:00 UTC (20:00 Malta)
  workflow_dispatch:

jobs:
  x-quote:
    name: Daily Quote to X
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set post time based on run hour
        run: |
          HOUR=$(date -u +%H)
          if [ "$HOUR" -lt 12 ]; then
            echo "POST_HOUR_UTC=6" >> $GITHUB_ENV
            echo "Morning run: posting at 06:00 UTC (08:00 Malta)"
          else
            echo "POST_HOUR_UTC=18" >> $GITHUB_ENV
            echo "Evening run: posting at 18:00 UTC (20:00 Malta)"
          fi

      - name: Install fonts + dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-liberation
          pip install anthropic requests Pillow

      - name: Run Quotes Pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          PYTHONPATH:          ${{ github.workspace }}
        run: python scripts/quotes_pipeline.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: x-quote-run-${{ github.run_number }}
          path: scripts/quotes_output/
          retention-days: 14
