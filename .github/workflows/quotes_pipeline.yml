name: Daily Quote -- X (Twitter)

# Repurposed from TikTok+Facebook to X only -- July 2026
on:
  schedule:
    - cron: "30 0 * * *"
  workflow_dispatch:

jobs:
  x-quote:
    name: Daily Quote to X
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fonts + dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-liberation
          pip install anthropic requests Pillow

      - name: Run Quotes Pipeline
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          POST_HOUR_UTC:       "6"
          PYTHONPATH:          ${{ github.workspace }}
        run: python scripts/quotes_pipeline.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: x-quote-run-${{ github.run_number }}
          path: scripts/quotes_output/
          retention-days: 14
