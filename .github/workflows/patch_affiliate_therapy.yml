name: Patch Affiliate Therapy
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run patch
        run: python3 scripts/patch_affiliate_therapy.py
      - name: Verify
        run: |
          grep -q "THERAPY_ANGLES" scripts/affiliate_carousel_pipeline.py && echo "angles OK"
          grep -q "AFFILIATE_LINK" scripts/affiliate_carousel_pipeline.py && echo "link OK"
          grep -q "pick_angle" scripts/affiliate_carousel_pipeline.py && echo "function OK"
          ! grep -q "affiliate_products.json" scripts/affiliate_carousel_pipeline.py && echo "amazon removed OK"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/affiliate_carousel_pipeline.py
          git commit -m "feat: convert affiliate carousel to Online-Therapy.com focus"
          git push
