name: Patch -- Digest Pinterest + Facebook Fix
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Run patch
        run: python scripts/patch_digest_pinterest.py
      - name: Verify
        run: grep -n "pinterest" scripts/telegram_digest.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/telegram_digest.py
          git diff --staged --quiet || git commit -m "fix: add Pinterest + improve Facebook msg in Telegram digest"
          git push
