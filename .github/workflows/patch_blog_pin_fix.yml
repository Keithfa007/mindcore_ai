name: Patch Blog Pin Fix
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run patch
        run: python3 scripts/patch_blog_pin_fix.py
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/blog_automation.py
          git commit -m "Blog automation: fix Pinterest pin by bundling X platform + auto-tweet blog posts"
          git push
