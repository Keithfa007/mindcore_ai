name: Male Video Pipeline -- Slot B (3pm Malta)

# POST_HOUR_UTC=13 is HARDCODED here.
# Even if GitHub delays this job by hours, Upload-Post fires at exactly 3pm Malta.
# No slot detection needed -- workflow is the source of truth.
on:
  workflow_dispatch:
    inputs:
      force_mode:
        description: "'content' or 'ad' (blank = auto)"
        required: false
        default: ""

  schedule:
    - cron: "0 1 * * 6,0"  # Sat/Sun 01:00 UTC = 3am Malta

jobs:
  male-slot-b:
    name: Male Video Slot B -- posts 3pm Malta
    runs-on: ubuntu-latest
    timeout-minutes: 60
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install deps
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends --fix-missing ffmpeg fonts-liberation
          pip install anthropic requests openai-whisper fal-client
      - name: Run Slot B
        env:
          ANTHROPIC_API_KEY:   ${{ secrets.ANTHROPIC_API_KEY }}
          FISH_AUDIO_API_KEY:  ${{ secrets.FISH_AUDIO_API_KEY }}
          PEXELS_API_KEY:      ${{ secrets.PEXELS_API_KEY }}
          SERP_API_KEY:        ${{ secrets.SERP_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          FAL_KEY:             ${{ secrets.FAL_KEY }}
          GITHUB_RUN_NUMBER:   ${{ github.run_number }}
          PYTHONPATH:          ${{ github.workspace }}
          POST_HOUR_UTC:       "13"
        run: |
          FORCE="${{ github.event.inputs.force_mode }}"
          [ "$FORCE" = "ad" ]      && export GITHUB_RUN_NUMBER=10
          [ "$FORCE" = "content" ] && export GITHUB_RUN_NUMBER=1
          python video_pipeline/male_pipeline_patch.py
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: male-slot-b-run-${{ github.run_number }}
          path: |
            video_pipeline/output/mindcore_ai_video.mp4
            video_pipeline/output/upload_guide.txt
            video_pipeline/output/script.json
            video_pipeline/output/upload_result.json
          retention-days: 30
      - name: Debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: male-slot-b-debug-${{ github.run_number }}
          path: video_pipeline/output/
          retention-days: 7
      - name: Summary
        if: always()
        run: |
          echo "## Male Slot B | 3pm Malta | POST_HOUR_UTC=13" >> $GITHUB_STEP_SUMMARY
          echo "Run #${{ github.run_number }}" >> $GITHUB_STEP_SUMMARY
          [ -f video_pipeline/output/upload_result.json ] && cat video_pipeline/output/upload_result.json >> $GITHUB_STEP_SUMMARY || true
