name: Facebook Daily Post

on:
  # Optimal posting times per day in Malta (CEST = UTC+2 in summer).
  # During winter (CET = UTC+1) these fire 1 hour earlier locally — still inside the engagement window.
  schedule:
    - cron: "0 8 * * 1"   # Monday    10:00 Malta — settle-into-week scroll
    - cron: "0 8 * * 2"   # Tuesday   10:00 Malta — strong morning window
    - cron: "0 7 * * 3"   # Wednesday 09:00 Malta — peak engagement day
    - cron: "0 7 * * 4"   # Thursday  09:00 Malta — mirrors Wednesday
    - cron: "0 7 * * 5"   # Friday    09:00 Malta — early before weekend drift
    - cron: "0 10 * * 6"  # Saturday  12:00 Malta — leisure-scroll afternoon
    - cron: "0 9 * * 0"   # Sunday    11:00 Malta — relaxed scroll
  workflow_dispatch: # manual trigger from Actions tab

jobs:
  post-to-facebook:
    name: Generate & Post to Facebook
    runs-on: ubuntu-latest
    timeout-minutes: 5

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic requests

      - name: Run Facebook automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:   ${{ secrets.FB_ACCESS_TOKEN }}
        run: python scripts/facebook_automation.py

      - name: Commit post history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"
          git add scripts/fb_post_history.json
          git diff --staged --quiet || git commit -m "chore: update FB post history [skip ci]"
          git push
        continue-on-error: true
