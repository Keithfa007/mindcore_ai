name: Facebook Daily Post

# PAUSED -- June 2026
# Facebook organic reach was low. Carousel pipeline now handles
# Facebook posting (via Upload-Post) alongside TikTok.
# Re-enable by restoring the schedule block below.
on:
  workflow_dispatch:  # Manual only -- schedule removed

jobs:
  post-to-facebook:
    name: Generate & Post to Facebook
    runs-on: ubuntu-latest
    timeout-minutes: 8

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install anthropic requests Pillow

      - name: Run Facebook automation
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:    ${{ secrets.OPENAI_API_KEY }}
          FB_PAGE_ID:        ${{ secrets.FB_PAGE_ID }}
          FB_ACCESS_TOKEN:   ${{ secrets.FB_ACCESS_TOKEN }}
        run: python scripts/facebook_automation.py

      - name: Commit post history
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name  "GitHub Action"
          git add scripts/fb_post_history.json
          git diff --staged --quiet || git commit -m "chore: update FB post history [skip ci]"
          git push
        continue-on-error: true
