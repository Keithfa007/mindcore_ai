name: Affiliate Carousel Pipeline

on:
  schedule:
    - cron: '0 9 * * 3,5'  # Wed + Fri at 09:00 UTC (11:00 Malta)
  workflow_dispatch:

jobs:
  affiliate-carousel:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests Pillow fal-client

      - name: Run affiliate carousel pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          UPLOAD_POST_API_KEY: ${{ secrets.UPLOAD_POST_API_KEY }}
          FAL_KEY: ${{ secrets.FAL_KEY }}
          PYTHONPATH: ${{ github.workspace }}
        run: python scripts/affiliate_carousel_pipeline.py

      - name: Commit history
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add scripts/affiliate_carousel_history.json || true
          git diff --cached --quiet || git commit -m "chore: update affiliate carousel history"
          git push || true
