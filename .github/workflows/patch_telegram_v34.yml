name: Patch Telegram Digest v3.4
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      - name: Run patch
        run: python3 scripts/patch_telegram_digest.py
      - name: Verify patch
        run: |
          grep -q "v3.4" scripts/telegram_digest.py && echo "Version OK"
          grep -q "_extract_pages_from_response" scripts/telegram_digest.py && echo "Helper OK"
          grep -q "pages_raw = fb_resp.json()" scripts/telegram_digest.py && echo "New block OK"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add scripts/telegram_digest.py
          git commit -m "Telegram digest v3.4: fix Facebook page lookup to handle dict response"
          git push
