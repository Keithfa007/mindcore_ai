name: Apply Anti-AI Writing Rules

on:
  workflow_dispatch:

jobs:
  apply-rules:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
      
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Run anti-AI injection script
        run: python scripts/apply_anti_ai_rules.py
      
      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "chore: apply anti-AI writing rules to all pipeline prompts"
          git push
