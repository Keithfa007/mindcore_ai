name: Patch Kinetic BG Diversity
on:
  workflow_dispatch:
jobs:
  patch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run patch
        run: python3 scripts/patch_kinetic_bg.py
      - name: Verify
        run: |
          grep -q "BG_VISUAL_CATEGORIES" video_pipeline/kinetic_text_pipeline.py && echo "categories OK"
          grep -q "urban_night" video_pipeline/kinetic_text_pipeline.py && echo "diversity OK"
      - name: Commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add video_pipeline/kinetic_text_pipeline.py
          git commit -m "feat: add 10 visual categories for kinetic background diversity"
          git push
