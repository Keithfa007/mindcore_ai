name: Add Retry Logic to Blog Automation

on:
  workflow_dispatch:

jobs:
  add-retry:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Run retry logic patch
        run: python scripts/add_retry_logic.py

      - name: Commit changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --staged --quiet || git commit -m "fix: add retry logic for Anthropic 529 errors in blog_automation.py"
          git push
