name: Carousel Image Post Pipeline -- EU

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  generate-carousel:
    name: Generate + Schedule 6-Slide Carousel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-liberation

      - name: Install Python dependencies
        run: pip install anthropic requests Pillow fal-client

      - name: Run Carousel Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY:              ${{ secrets.FAL_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
          PYTHONPATH:           ${{ github.workspace }}
        run: python scripts/carousel_pipeline.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: carousel-run-${{ github.run_number }}
          path: scripts/output_carousel/
          retention-days: 30
