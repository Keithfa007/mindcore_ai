name: Carousel Image Post Pipeline -- EU

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  generate-carousel:
    name: Generate + Schedule 6-Slide Carousel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Switch to fal.ai Flux Schnell
        run: |
          python3 << 'PATCH'
          import re
          c = open('scripts/carousel_pipeline.py').read()
          c = c.replace('from openai import OpenAI', 'from scripts.fal_image import generate_fal_image')
          c = c.replace('oc=OpenAI(api_key=OPENAI_API_KEY)', 'oc=None  # fal.ai replaces OpenAI')
          new_fn = "def generate_slide_image(oc,sk,topic,gender):\n    pools=IMAGE_POOLS_MALE if gender==\"male\" else IMAGE_POOLS_FEMALE\n    ps=len(pools[sk]); sn=int(sk.split(\"_\")[1]); base_idx=(GITHUB_RUN_NUMBER+sn-1)%ps\n    for attempt in range(3):\n        idx=(base_idx+attempt)%ps\n        prompt=pools[sk][idx]\n        if sk==\"slide_1\" and topic: prompt=f\"{prompt} Emotional theme: {topic}.\"\n        print(f\"  [fal.ai Flux] {sk} generating... (pool idx {idx}/{ps-1}, attempt {attempt+1}/3)\")\n        try:\n            ib=generate_fal_image(prompt)\n            print(f\"  [fal.ai Flux] {sk} ready ({len(ib)//1024:.0f} KB)\"); return ib\n        except Exception as e:\n            if \"safety\" in str(e).lower() or \"moderation\" in str(e).lower():\n                print(f\"  [fal.ai] {sk} BLOCKED (attempt {attempt+1}/3), trying next prompt...\")\n                continue\n            raise\n    raise RuntimeError(f\"All 3 image prompts for {sk} were blocked\")"
          c = re.sub(r'def generate_slide_image\(oc,sk,topic,gender\):.*?(?=\ndef resize_to_tiktok)', new_fn + '\n\n', c, flags=re.DOTALL)
          open('scripts/carousel_pipeline.py','w').write(c)
          print("Patched: fal.ai Flux Schnell for carousel")
          PATCH

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-liberation

      - name: Install Python dependencies
        run: pip install anthropic requests Pillow

      - name: Run Carousel Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY:              ${{ secrets.FAL_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
          PYTHONPATH:           ${{ github.workspace }}
        run: python scripts/carousel_pipeline.py

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: carousel-run-${{ github.run_number }}
          path: scripts/output_carousel/
          retention-days: 30
