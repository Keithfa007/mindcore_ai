name: Carousel Image Post Pipeline

on:
  workflow_dispatch:
  schedule:
    - cron: "0 2 * * *"

jobs:
  generate-carousel:
    name: Generate + Schedule 6-Slide Carousel
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Set image quality to low (cost reduction)
        run: |
          sed -i 's/quality="high"/quality="low"/g' scripts/carousel_pipeline.py
          echo "Image quality: LOW (~$0.02/image instead of ~$0.19)"

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-liberation

      - name: Install Python dependencies
        run: pip install anthropic requests openai pillow

      - name: Run Carousel Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
        run: python scripts/carousel_pipeline.py

      - uses: actions/upload-artifact@v4
        if: success()
        with:
          name: carousel-run-${{ github.run_number }}
          path: |
            scripts/output_carousel/slide_1.jpg
            scripts/output_carousel/slide_2.jpg
            scripts/output_carousel/slide_3.jpg
            scripts/output_carousel/slide_4.jpg
            scripts/output_carousel/slide_5.jpg
            scripts/output_carousel/slide_6.jpg
            scripts/output_carousel/carousel_caption.txt
            scripts/output_carousel/carousel_script.json
            scripts/output_carousel/carousel_upload_result.json
          retention-days: 30

      - uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: carousel-debug-${{ github.run_number }}
          path: scripts/output_carousel/
          retention-days: 7
