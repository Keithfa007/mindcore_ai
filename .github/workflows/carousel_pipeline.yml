name: Carousel Image Post Pipeline

# Male/female alternating partner-directed + direct-address carousels
# TikTok Photo Mode (draft) + Facebook direct
#
# SCHEDULE RATIONALE -- 13:00 UTC = 3pm Malta
# -----------------------------------------------
# Female video cron: 09:00 UTC --> typically lands 11am-1pm Malta
# Male videos cron:  03:00 + 07:00 UTC (Sat/Sun) --> lands 5am-11am Malta
# Carousel: 13:00 UTC --> live 3:10pm Malta (10min generation, no delay)
#
# This places the carousel BETWEEN the typical video landings:
#   - 2hr gap after female video (normal case)
#   - 4hr gap before female video worst case (7pm)
#   - Well after male videos (weekends)
#   - Peak TikTok engagement window: 2pm-6pm local (Sprout Social 2026)
#
# Full daily content schedule (Malta time):
#   ~11am-1pm  : Female video (09:00 UTC cron + generation)
#   ~3pm       : Carousel (this pipeline, precise)
#   ~7pm       : Female video worst case / target
#   Sat/Sun AM : Male videos A + B
#
# Cost: ~$0.48/post (6 x gpt-image-1 high)
on:
  workflow_dispatch:
    inputs:
      run_note:
        description: "Optional note"
        required: false
        default: "manual"

  schedule:
    - cron: "0 13 * * *"  # 13:00 UTC = 3pm Malta -- clean gap between video landings

jobs:
  generate-carousel:
    name: Generate + Upload 6-Slide Carousel (Male/Female Alternating)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install fonts
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends fonts-liberation

      - name: Install Python dependencies
        run: pip install anthropic requests openai pillow

      - name: Show run info
        run: |
          echo "Pipeline: Carousel Image Post v2.4"
          echo "Endpoint: /api/upload_photos (photos[] + MEDIA_UPLOAD)"
          echo "Format: 6-slide male/female alternating carousel"
          echo "Images: gpt-image-1 high (~$0.08/image)"
          echo "Platforms: TikTok (draft) + Facebook (direct)"
          echo "Schedule: 13:00 UTC = 3pm Malta (safe gap from video pipelines)"

      - name: Run Carousel Pipeline
        env:
          ANTHROPIC_API_KEY:    ${{ secrets.ANTHROPIC_API_KEY }}
          OPENAI_API_KEY:       ${{ secrets.OPENAI_API_KEY }}
          UPLOAD_POST_API_KEY:  ${{ secrets.UPLOAD_POST_API_KEY }}
          GITHUB_RUN_NUMBER:    ${{ github.run_number }}
        run: python scripts/carousel_pipeline.py

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        if: success()
        with:
          name: carousel-run-${{ github.run_number }}
          path: |
            scripts/output_carousel/slide_1.jpg
            scripts/output_carousel/slide_2.jpg
            scripts/output_carousel/slide_3.jpg
            scripts/output_carousel/slide_4.jpg
            scripts/output_carousel/slide_5.jpg
            scripts/output_carousel/slide_6.jpg
            scripts/output_carousel/carousel_caption.txt
            scripts/output_carousel/carousel_script.json
            scripts/output_carousel/carousel_upload_result.json
          retention-days: 30

      - name: Upload debug on failure
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: carousel-debug-${{ github.run_number }}
          path: scripts/output_carousel/
          retention-days: 7

      - name: Write job summary
        if: always()
        run: |
          echo "## Carousel Image Post Pipeline v2.4" >> $GITHUB_STEP_SUMMARY
          echo "**Run:** #${{ github.run_number }} | 6 slides | 3pm Malta | TikTok draft + Facebook" >> $GITHUB_STEP_SUMMARY
          if [ -f "scripts/output_carousel/carousel_script.json" ]; then
            TOPIC=$(python3 -c "import json; d=json.load(open('scripts/output_carousel/carousel_script.json')); print(d.get('topic',''))" 2>/dev/null || echo "")
            H1=$(python3 -c "import json; d=json.load(open('scripts/output_carousel/carousel_script.json')); print(d.get('s1_command',''))" 2>/dev/null || echo "")
            H2=$(python3 -c "import json; d=json.load(open('scripts/output_carousel/carousel_script.json')); print(d.get('s1_hero',''))" 2>/dev/null || echo "")
            echo "**Topic:** $TOPIC" >> $GITHUB_STEP_SUMMARY
            echo "**Headline:** $H1 / $H2" >> $GITHUB_STEP_SUMMARY
          fi
          if [ -f "scripts/output_carousel/carousel_upload_result.json" ]; then
            echo "### Upload Result" >> $GITHUB_STEP_SUMMARY
            echo '```json' >> $GITHUB_STEP_SUMMARY
            cat scripts/output_carousel/carousel_upload_result.json >> $GITHUB_STEP_SUMMARY
            echo '```' >> $GITHUB_STEP_SUMMARY
          fi
