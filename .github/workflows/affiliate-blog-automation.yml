name: MindCore AI -- Affiliate Blog Automation

on:
  schedule:
    - cron: '0 10 * * 3'
    - cron: '0 10 * * 5'
  workflow_dispatch:

jobs:
  publish-affiliate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Switch image gen to fal.ai Flux Pro
        run: |
          python3 << 'PATCH'
          import re
          c = open('scripts/affiliate_blog_automation.py').read()
          c = c.replace('from openai import OpenAI', 'from scripts.fal_image import generate_fal_image')
          c = c.replace('openai_client    = OpenAI(api_key=os.environ["OPENAI_API_KEY"])', '# openai_client removed -- using fal.ai')
          new_fn = "def generate_illustration(image_prompt):\n    print(\"Generating cinematic image (fal.ai Flux Pro)...\")\n    prompt = (\n        f\"{image_prompt}. Style: cinematic photography, warm golden-hour lighting, \"\n        \"soft focus background, shallow depth of field, no faces shown, \"\n        \"warm amber and soft teal colour grading, photorealistic. No text in the image.\"\n    )\n    return generate_fal_image(prompt, image_size=\"landscape_4_3\", model=\"pro\")"
          c = re.sub(r'def generate_illustration\(image_prompt\):.*?(?=\ndef )', new_fn + '\n\n', c, flags=re.DOTALL)
          open('scripts/affiliate_blog_automation.py','w').write(c)
          print("Patched: fal.ai Flux Pro for affiliate blog images")
          PATCH

      - name: Install dependencies
        run: pip install anthropic requests cloudscraper

      - name: Run affiliate blog pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY:           ${{ secrets.FAL_KEY }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
        run: python scripts/affiliate_blog_automation.py
