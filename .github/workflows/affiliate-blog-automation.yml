name: MindCore AI -- Affiliate Blog Automation

# Wednesday only (reduced from Wed+Fri to keep 3:1 ratio of original to affiliate content)
on:
  schedule:
    - cron: '0 10 * * 3'
  workflow_dispatch:

jobs:
  publish-affiliate-blog:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install anthropic requests cloudscraper fal-client

      - name: Run affiliate blog pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          FAL_KEY:           ${{ secrets.FAL_KEY }}
          WP_USERNAME:       ${{ secrets.WP_USERNAME }}
          WP_APP_PASSWORD:   ${{ secrets.WP_APP_PASSWORD }}
          GITHUB_TOKEN:      ${{ secrets.GITHUB_TOKEN }}
          PYTHONPATH:        ${{ github.workspace }}
        run: python scripts/affiliate_blog_automation.py
