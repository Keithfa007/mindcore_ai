// android/settings.gradle (Groovy)
pluginManagement {
    def flutterSdkPath = {
        def props = new Properties()
        def propsFile = new File(settingsDir, "local.properties")
        if (propsFile.exists()) {
            propsFile.withReader("UTF-8") { r -> props.load(r) }
        }
        def path = props.getProperty("flutter.sdk")
        assert path != null : "flutter.sdk not set in local.properties"
        return path
    }()
    includeBuild("$flutterSdkPath/packages/flutter_tools/gradle")
    repositories {
        google()
        mavenCentral()
        gradlePluginPortal()
    }
}

plugins {
    id "dev.flutter.flutter-plugin-loader" version "1.0.0"
    id "com.android.application" version "8.9.1" apply false        // OK if your Gradle wrapper supports it
    id "org.jetbrains.kotlin.android" version "2.1.0" apply false   // OK with AGP 8.7.x
    id "com.google.gms.google-services" version "4.4.2" apply false // <-- add this for Firebase
}

include ":app"
