name: MindCore AI Video Pipeline

on:
  schedule:
    # Runs Mon, Wed, Fri at 07:00 UTC
    - cron: "0 7 * * 1,3,5"
  workflow_dispatch:
    # Also allows manual trigger from GitHub Actions tab

jobs:
  generate-video:
    name: Generate MindCore AI Video
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      # ── 1. Checkout repo ──────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── 2. Set up Python ──────────────────────────────────────────────
      - name: Set up Python 3.11
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # ── 3. Install dependencies ───────────────────────────────────────
      - name: Install Python dependencies
        run: |
          pip install -r video_pipeline/requirements.txt

      # ── 4. Install FFmpeg ─────────────────────────────────────────────
      - name: Install FFmpeg
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y ffmpeg
          ffmpeg -version

      # ── 5. Create outputs directory ───────────────────────────────────
      - name: Create outputs directory
        run: mkdir -p video_pipeline/outputs

      # ── 6. Generate SEO-optimised script ─────────────────────────────
      - name: Generate script via Anthropic API
        working-directory: video_pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python scripts/generate_script.py

      # ── 7. Generate voiceover ─────────────────────────────────────────
      - name: Generate voiceover via Fish Audio
        working-directory: video_pipeline
        env:
          FISH_AUDIO_API_KEY: ${{ secrets.FISH_AUDIO_API_KEY }}
          FISH_VOICE_ID: ${{ secrets.FISH_VOICE_ID }}
        run: python scripts/generate_voice.py

      # ── 8. Generate background video ──────────────────────────────────
      - name: Generate background video via WaveSpeed AI
        working-directory: video_pipeline
        env:
          WAVESPEED_API_KEY: ${{ secrets.WAVESPEED_API_KEY }}
        run: python scripts/generate_video.py

      # ── 9. Merge audio + video ────────────────────────────────────────
      - name: Merge audio and video with FFmpeg
        working-directory: video_pipeline
        run: python scripts/merge_video.py

      # ── 10. Upload final video as artifact ────────────────────────────
      - name: Upload finished video
        uses: actions/upload-artifact@v4
        with:
          name: mindcore-video-${{ github.run_number }}
          path: |
            video_pipeline/outputs/mindcore_video_*.mp4
            video_pipeline/outputs/mindcore_caption_*.txt
            video_pipeline/outputs/script_output.json
          retention-days: 14

      # ── 11. Print caption to logs for quick reference ─────────────────
      - name: Print caption to logs
        working-directory: video_pipeline
        run: |
          echo "============================================"
          echo "VIDEO READY — Download from Actions Artifacts"
          echo "============================================"
          cat outputs/script_output.json | python3 -c "
          import sys, json
          d = json.load(sys.stdin)
          print('TITLE:   ', d.get('title',''))
          print('HOOK:    ', d.get('hook',''))
          print('CAPTION: ', d.get('caption',''))
          print('KEYWORD: ', d.get('primary_keyword',''))
          "
          echo "============================================"
